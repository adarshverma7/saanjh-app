name: saanjh
description: "A living diary - kept forever, for the people you love."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  flutter_svg: ^2.0.10+1
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  camera: ^0.11.0+2
  video_player: ^2.9.2
  vibration: ^2.0.0
  shared_preferences: ^2.3.3
  share_plus: ^10.1.2
  path_provider: ^2.1.4
  speech_to_text: ^7.0.0
  shimmer: ^3.0.0
  home_widget: ^0.7.0
  just_audio: ^0.9.40
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  # Backend integration
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^10.1.0
  # Firebase Auth (storage migrated to Supabase)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5
  # Audio recording
  record: ^6.2.1
  smart_auth: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
